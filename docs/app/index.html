<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EngKey - Web Translator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0f0f15; --surface: #181820; --surface-soft: #1d1d28; --fg: #e2e2ec; --accent: #7aa9f5; --muted: #4a4a5a; --subtext: #9090a8; --radius: 12px; --radius-sm: 8px; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }
  body::before { content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(ellipse at 20% 20%, rgba(122, 169, 245, 0.04) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(122, 169, 245, 0.03) 0%, transparent 50%); pointer-events: none; z-index: 0; }
  .header { position: relative; z-index: 1; background: var(--surface); padding: 0.8rem 1.2rem; display: flex; align-items: center; gap: 0.8rem; border-bottom: 1px solid rgba(74, 74, 90, 0.2); flex-shrink: 0; }
  .header h1 { font-size: 1.1rem; font-weight: 600; background: linear-gradient(135deg, #89b4fa, #b4d0fb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .header span { color: var(--subtext); font-size: 0.8rem; font-weight: 400; }
  .header a { color: var(--subtext); font-size: 0.82rem; text-decoration: none; margin-left: auto; transition: color 0.2s; font-weight: 500; }
  .header a:hover { color: var(--accent); }
  .container { position: relative; z-index: 1; flex: 1; display: flex; flex-direction: column; max-width: 600px; margin: 0 auto; width: 100%; padding: 1rem; gap: 0.5rem; }
  .lang-row { display: flex; gap: 0.5rem; align-items: center; }
  .lang-row select { flex: 1; background: var(--surface); color: var(--fg); border: 1px solid rgba(74, 74, 90, 0.3); padding: 0.5rem; border-radius: var(--radius-sm); font-size: 0.85rem; font-family: inherit; cursor: pointer; transition: border-color 0.2s; }
  .lang-row select:focus { outline: none; border-color: var(--accent); }
  .swap-btn { background: var(--surface); color: var(--subtext); border: 1px solid rgba(74, 74, 90, 0.3); padding: 0.5rem 0.7rem; border-radius: var(--radius-sm); cursor: pointer; font-size: 1rem; transition: border-color 0.2s, color 0.2s; }
  .swap-btn:hover { border-color: var(--accent); color: var(--accent); }
  textarea { width: 100%; background: var(--surface); color: var(--fg); border: 1px solid rgba(74, 74, 90, 0.25); border-radius: var(--radius); padding: 0.8rem; font-size: 0.95rem; resize: none; font-family: inherit; transition: border-color 0.2s; }
  textarea:focus { outline: none; border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }
  .input-area { flex: 0 0 auto; }
  .output-area { flex: 1; min-height: 120px; }
  .output-area textarea { height: 100%; }
  .status { color: var(--subtext); font-size: 0.78rem; text-align: center; padding: 0.3rem; min-height: 1.5rem; }
  .btn-row { display: flex; gap: 0.4rem; align-items: center; }
  .btn { padding: 0.45rem 1rem; border-radius: var(--radius-sm); border: none; cursor: pointer; font-size: 0.82rem; font-weight: 500; font-family: inherit; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: #0f0f15; box-shadow: 0 2px 8px rgba(122, 169, 245, 0.2); }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-secondary { background: var(--surface); color: var(--fg); border: 1px solid rgba(74, 74, 90, 0.3); }
  .btn-secondary:hover { border-color: var(--accent); }
  .footer { text-align: center; padding: 0.5rem; color: var(--muted); font-size: 0.75rem; border-top: 1px solid rgba(74, 74, 90, 0.1); flex-shrink: 0; position: relative; z-index: 1; }
  .footer a { color: var(--accent); text-decoration: none; }
  .error { color: #f38ba8; }
  .switch { display: flex; gap: 0.4rem; align-items: center; margin-left: auto; }
  .switch label { font-size: 0.82rem; color: var(--subtext); cursor: pointer; user-select: none; }
  .switch input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; }
  @media (max-width: 400px) { .container { padding: 0.5rem; } }
</style>
</head>
<body>

<div class="header">
  <h1>EngKey</h1>
  <span style="font-size:0.8rem;color:var(--subtext)">Web Translator</span>
  <a href="../">Download Desktop App</a>
</div>

<div class="container">
  <div class="lang-row">
    <select id="srcLang">
      <option value="auto">Auto-detect</option>
      <option value="en" selected>English</option>
      <option value="es">Spanish</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="it">Italian</option>
      <option value="pt">Portuguese</option>
      <option value="ru">Russian</option>
      <option value="ja">Japanese</option>
      <option value="ko">Korean</option>
      <option value="zh">Chinese</option>
      <option value="ar">Arabic</option>
      <option value="nl">Dutch</option>
      <option value="pl">Polish</option>
      <option value="tr">Turkish</option>
      <option value="vi">Vietnamese</option>
      <option value="th">Thai</option>
      <option value="hi">Hindi</option>
    </select>
    <button class="swap-btn" id="swapBtn" title="Swap languages">⇄</button>
    <select id="tgtLang">
      <option value="es" selected>Spanish</option>
      <option value="en">English</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="it">Italian</option>
      <option value="pt">Portuguese</option>
      <option value="ru">Russian</option>
      <option value="ja">Japanese</option>
      <option value="ko">Korean</option>
      <option value="zh">Chinese</option>
      <option value="ar">Arabic</option>
      <option value="nl">Dutch</option>
      <option value="pl">Polish</option>
      <option value="tr">Turkish</option>
      <option value="vi">Vietnamese</option>
      <option value="th">Thai</option>
      <option value="hi">Hindi</option>
    </select>
  </div>

  <div class="input-area">
    <textarea id="inputText" rows="4" placeholder="Type or paste text to translate..."></textarea>
  </div>

  <div class="status" id="status">Powered by Google Translate</div>

  <div class="btn-row">
    <button class="btn btn-primary" id="translateBtn">Translate</button>
    <button class="btn btn-secondary" id="clearBtn">Clear</button>
    <button class="btn btn-secondary" id="copyBtn">Copy</button>
    <div class="switch" style="margin-left:auto">
      <label for="autoTranslate">Auto</label>
      <input type="checkbox" id="autoTranslate" checked>
    </div>
  </div>

  <div class="output-area">
    <textarea id="outputText" rows="4" placeholder="Translation..." readonly></textarea>
  </div>
</div>

<div class="footer">
  <p>Powered by Google Translate · <a href="https://github.com/Vashuus/EngKey">GitHub</a> · MIT License</p>
</div>

<script>
const srcLang = document.getElementById('srcLang');
const tgtLang = document.getElementById('tgtLang');
const inputText = document.getElementById('inputText');
const outputText = document.getElementById('outputText');
const translateBtn = document.getElementById('translateBtn');
const clearBtn = document.getElementById('clearBtn');
const copyBtn = document.getElementById('copyBtn');
const swapBtn = document.getElementById('swapBtn');
const autoTranslate = document.getElementById('autoTranslate');
const status = document.getElementById('status');

let debounceTimer = null;
let isTranslating = false;

async function translate() {
  const text = inputText.value.trim();
  if (!text || isTranslating) return;

  const src = srcLang.value;
  const tgt = tgtLang.value;

  if (src === tgt && src !== 'auto') {
    outputText.value = text;
    status.textContent = 'Same language — no translation needed.';
    return;
  }

  isTranslating = true;
  status.textContent = 'Translating...';
  status.className = 'status';

  try {
    const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=' + src + '&tl=' + tgt + '&dt=t&q=' + encodeURIComponent(text);
    const res = await fetch(url);

    if (!res.ok) throw new Error('HTTP ' + res.status);

    const data = await res.json();
    outputText.value = data[0].map(function(s) { return s[0]; }).filter(Boolean).join('');
    status.textContent = 'Translated \u2713';
    status.className = 'status';
  } catch (err) {
    console.error('Translation error:', err);
    status.textContent = 'Translation failed. Check your connection or try again.';
    status.className = 'status error';
  } finally {
    isTranslating = false;
  }
}

function onInputChange() {
  if (autoTranslate.checked) {
    if (debounceTimer) clearTimeout(debounceTimer);
    debounceTimer = setTimeout(translate, 400);
  }
}

inputText.addEventListener('input', onInputChange);
srcLang.addEventListener('change', onInputChange);
tgtLang.addEventListener('change', onInputChange);
translateBtn.addEventListener('click', translate);

clearBtn.addEventListener('click', () => {
  inputText.value = '';
  outputText.value = '';
    status.textContent = 'Powered by Google Translate';
    status.className = 'status';
  inputText.focus();
});

copyBtn.addEventListener('click', async () => {
  if (!outputText.value) return;
  try {
    await navigator.clipboard.writeText(outputText.value);
    const orig = status.textContent;
    status.textContent = 'Copied! ✓';
    setTimeout(() => { status.textContent = orig; }, 1500);
  } catch {
    status.textContent = 'Failed to copy';
  }
});

swapBtn.addEventListener('click', () => {
  if (srcLang.value === 'auto') return;
  const tmp = srcLang.value;
  srcLang.value = tgtLang.value;
  tgtLang.value = tmp;
  const tmpText = inputText.value;
  inputText.value = outputText.value;
  outputText.value = '';
  if (autoTranslate.checked && inputText.value.trim()) translate();
});
</script>
</body>
</html>
