name: Build release binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-tk

      - name: Install Python deps
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller engkey.spec

      - name: Upload Linux binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "dist/EngKey#EngKey-Linux-x86_64" --repo "${{ github.repository }}" --clobber

  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        shell: pwsh
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary
        shell: pwsh
        run: |
          pyinstaller --onefile --windowed --name EngKey `
            --paths core `
            --hidden-import deep_translator `
            --hidden-import deepl `
            --hidden-import requests `
            --hidden-import openai `
            --add-data "core/native;core/native" `
            engkey.py

      - name: Upload Windows binary
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "dist/EngKey.exe#EngKey-Windows-x86_64.exe" --repo "${{ github.repository }}" --clobber

  build-macos:
    name: macOS (x86_64)
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller --onefile --windowed --name EngKey \
            --paths core \
            --hidden-import deep_translator \
            --hidden-import deepl \
            --hidden-import requests \
            --hidden-import openai \
            --add-data "core/native:core/native" \
            engkey.py

      - name: Upload macOS binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "dist/EngKey#EngKey-macOS-x86_64" --repo "${{ github.repository }}" --clobber
